services:
  backend:
    build:
      context: ./backend
    container_name: daydash-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DATABASE_URL=${DATABASE_URL:-jdbc:postgresql://db:5432/daydash}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - JWT_SECRET=${JWT_SECRET:-defaultSecretKeyForLocalDevWithAtLeast256bitsLength}
      - JWT_EXPIRATION_MS=${JWT_EXPIRATION_MS:-86400000}
    restart: unless-stopped
    networks:
      - daydash-network

  db:
    image: postgres:18-alpine
    container_name: daydash-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: daydash
    ports:
      - "5432:5432"
    volumes:
      - daydash-data:/var/lib/postgresql
    restart: unless-stopped
    networks:
      - daydash-network

  frontend:
    build:
      context: ./frontend
    container_name: daydash-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - daydash-network

networks:
  daydash-network:
    driver: bridge

volumes:
  daydash-data:
